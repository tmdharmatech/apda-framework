name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Testes (Node ${{ matrix.node }} / Python ${{ matrix.python }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["20", "22"]
        python: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Configurar Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Instalar dependências Node.js
        run: npm ci

      - name: Instalar dependências Python (leves, sem torch/transformers)
        run: |
          python -m pip install --upgrade pip
          # Instala somente deps necessárias para testes (exclui torch/transformers)
          grep -v -E "^torch|^transformers" requirements.txt | pip install -r /dev/stdin

      - name: Testes Node.js
        run: npm test

      - name: Testes Python (pytest)
        run: python -m pytest scripts/tests/ -v --tb=short
