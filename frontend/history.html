<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDA — Histórico</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main { display: flex; flex-direction: column; gap: 14px; }

    /* ── Tabela ──────────────────────────────── */
    .runs-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--line);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--primary-weak); }
    tbody tr.selected { background: var(--primary-weak); }
    tbody td { padding: 10px 12px; vertical-align: middle; }

    .run-id-cell {
      font-family: monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-badge.ok       { background: #dcfce7; color: #15803d; }
    .status-badge.error    { background: #fee2e2; color: #b91c1c; }
    .status-badge.dry-run  { background: #ede9fe; color: #6d28d9; }
    .status-badge.running  { background: #fff7ed; color: #c2410c; }

    .dot-ok      { background: var(--ok); }
    .dot-error   { background: var(--risk); }
    .dot-dry-run { background: #a78bfa; }
    .dot-running { background: var(--warn); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .elapsed-cell { font-family: monospace; font-size: 12px; }
    .input-cell   { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .date-cell    { white-space: nowrap; color: var(--muted); font-size: 12px; }

    /* ── Painel de detalhe ───────────────────── */
    .detail-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .detail-panel.open { display: flex; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail-title { font-size: 16px; font-weight: 800; }

    .step-list { display: flex; flex-direction: column; gap: 6px; }

    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 13px;
    }
    .step-row.done  { border-color: var(--ok);   background: #f4fdf8; }
    .step-row.skip  { opacity: 0.45; }

    .step-icon  { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .step-label { font-weight: 700; flex: 1; }

    .output-list { display: flex; flex-direction: column; gap: 8px; }

    .output-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 13px;
    }

    .output-path {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .output-label { color: var(--muted); font-size: 12px; }

    .metric-row  { display: flex; gap: 14px; flex-wrap: wrap; }
    .metric-item {
      background: var(--chip);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }
    .metric-item strong { font-weight: 800; display: block; font-size: 18px; }

    pre.json-raw {
      background: #1a1f2e;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      font-size: 11px;
      overflow: auto;
      max-height: 320px;
      margin: 0;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: var(--muted);
      padding: 6px 0;
      user-select: none;
    }
    details summary:hover { color: var(--fg); }

    /* ── Filtros ────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input { font-size: 13px; }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Layout dividido ────────────────────── */
    .split-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 960px) {
      .split-layout {
        grid-template-columns: 1fr 380px;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <h1>APDA — Histórico de execuções</h1>
        <div class="subtitle" id="subtitle">Carregando...</div>
      </div>
      <div class="topbar-right">
        <button id="reloadBtn">Recarregar</button>
        <a href="/run.html" class="btn primary">Nova execução →</a>
      </div>
    </div>
  </header>

  <main>
    <!-- Filtros -->
    <div class="panel">
      <div class="filter-bar">
        <label style="font-size:12px;font-weight:700;color:var(--muted)">STATUS</label>
        <select id="filterStatus">
          <option value="">Todos</option>
          <option value="ok">ok</option>
          <option value="error">error</option>
          <option value="dry-run">dry-run</option>
          <option value="running">running</option>
        </select>
        <label style="font-size:12px;font-weight:700;color:var(--muted);margin-left:4px">WORKFLOW</label>
        <select id="filterWorkflow">
          <option value="">Todos</option>
        </select>
        <input id="filterSearch" type="search" placeholder="Filtrar por arquivo..." style="min-width:200px;margin-left:auto">
      </div>
    </div>

    <div class="split-layout">
      <!-- Tabela de execuções -->
      <div class="panel">
        <div class="runs-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Workflow</th>
                <th>Arquivo</th>
                <th>Duração</th>
                <th>Data</th>
                <th>ID</th>
              </tr>
            </thead>
            <tbody id="runsBody">
              <tr><td colspan="6" class="empty-state">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Detalhe lateral -->
      <div id="detailPanel" class="panel detail-panel">
        <div class="detail-header">
          <div>
            <div class="detail-title" id="detailTitle">–</div>
            <div style="color:var(--muted);font-size:12px;margin-top:3px" id="detailMeta">–</div>
          </div>
          <div id="detailBadge"></div>
        </div>

        <!-- Etapas -->
        <div>
          <div class="field-label" style="margin-bottom:8px">Etapas</div>
          <div id="detailSteps" class="step-list"></div>
        </div>

        <!-- Arquivos gerados -->
        <div id="detailOutputsWrap" style="display:none">
          <div class="field-label" style="margin-bottom:8px">Arquivos gerados</div>
          <div id="detailOutputs" class="output-list"></div>
        </div>

        <!-- Métricas -->
        <div id="detailMetricsWrap" style="display:none">
          <div class="field-label" style="margin-bottom:8px">Métricas</div>
          <div id="detailMetrics" class="metric-row"></div>
        </div>

        <!-- Erro -->
        <div id="detailErrorWrap" style="display:none">
          <div class="field-label" style="margin-bottom:6px;color:var(--risk)">Erro</div>
          <div id="detailError" class="error-msg"></div>
        </div>

        <!-- JSON bruto -->
        <details>
          <summary>JSON bruto (auditoria)</summary>
          <pre id="detailJson" class="json-raw"></pre>
        </details>

        <!-- Ações -->
        <div id="detailActions" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
    </div>
  </main>

  <script>
    const STEP_LABELS = {
      "extract-text":      "Extraindo texto",
      "privacy-filter":    "Privacy Filter (PII)",
      "generate-artifact": "Gerando artefato JSON",
      "validate-schema":   "Validando schema",
    };
    const STEP_ICONS = {
      "extract-text":      "📄",
      "privacy-filter":    "🔒",
      "generate-artifact": "🤖",
      "validate-schema":   "✅",
    };
    const OUTPUT_LABELS = {
      extracted:  "Texto extraído",
      anonymized: "Texto anonimizado",
      artifact:   "Artefato pedagógico",
    };
    const EXT_CLASS = { txt:"txt", json:"json", docx:"docx", pdf:"pdf", xlsx:"xlsx" };

    let allRuns = [];
    let selectedId = null;

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
    }

    function statusBadge(status) {
      const labels = { ok: "ok", error: "erro", "dry-run": "dry-run", running: "em andamento" };
      const label = labels[status] ?? status;
      return `<span class="status-badge ${esc(status)}">
        <span class="status-dot dot-${esc(status)}"></span>${esc(label)}
      </span>`;
    }

    function fmtDate(iso) {
      if (!iso) return "–";
      const d = new Date(iso);
      return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    }

    function fmtElapsed(ms) {
      if (ms == null) return "–";
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function fileName(path) {
      return path ? path.split("/").pop() : "–";
    }

    /* ── Carregar dados ─────────────────────── */
    async function loadRuns() {
      document.getElementById("runsBody").innerHTML =
        `<tr><td colspan="6" class="empty-state">Carregando...</td></tr>`;
      try {
        const r = await fetch("/api/runs", { cache: "no-store" });
        allRuns = await r.json();
        populateWorkflowFilter();
        renderTable();
        updateSubtitle();
      } catch (e) {
        document.getElementById("runsBody").innerHTML =
          `<tr><td colspan="6" class="empty-state" style="color:var(--risk)">Erro: ${esc(e.message)}</td></tr>`;
      }
    }

    function populateWorkflowFilter() {
      const wfSet = new Set(allRuns.map(r => r.workflowId).filter(Boolean));
      const sel = document.getElementById("filterWorkflow");
      const cur = sel.value;
      while (sel.options.length > 1) sel.remove(1);
      for (const wf of [...wfSet].sort()) {
        const opt = document.createElement("option");
        opt.value = wf;
        opt.textContent = wf;
        sel.appendChild(opt);
      }
      if (cur) sel.value = cur;
    }

    function filteredRuns() {
      const status   = document.getElementById("filterStatus").value;
      const workflow = document.getElementById("filterWorkflow").value;
      const search   = document.getElementById("filterSearch").value.trim().toLowerCase();
      return allRuns.filter(r => {
        if (status && r.status !== status) return false;
        if (workflow && r.workflowId !== workflow) return false;
        if (search) {
          const haystack = [r.id, r.workflowId, r.workflowName, r.input?.relativePath].join(" ").toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
    }

    function renderTable() {
      const runs = filteredRuns();
      if (!runs.length) {
        document.getElementById("runsBody").innerHTML =
          `<tr><td colspan="6" class="empty-state">Nenhuma execução encontrada.</td></tr>`;
        return;
      }
      document.getElementById("runsBody").innerHTML = runs.map(r => {
        const sel = r.id === selectedId ? " class=\"selected\"" : "";
        const shortId = r.id.split("-")[0] ?? r.id;
        const inputName = fileName(r.input?.relativePath ?? r.input?.path ?? "");
        return `<tr${sel} data-id="${esc(r.id)}">
          <td>${statusBadge(r.status)}</td>
          <td>${esc(r.workflowName ?? r.workflowId ?? "–")}</td>
          <td class="input-cell" title="${esc(inputName)}">${esc(inputName)}</td>
          <td class="elapsed-cell">${fmtElapsed(r.elapsedMs)}</td>
          <td class="date-cell">${fmtDate(r.startedAt)}</td>
          <td class="run-id-cell">${esc(shortId)}</td>
        </tr>`;
      }).join("");
      document.querySelectorAll("#runsBody tr[data-id]").forEach(row => {
        row.addEventListener("click", () => openDetail(row.dataset.id));
      });
    }

    function updateSubtitle() {
      const total   = allRuns.length;
      const ok      = allRuns.filter(r => r.status === "ok").length;
      const errors  = allRuns.filter(r => r.status === "error").length;
      const running = allRuns.filter(r => r.status === "running").length;
      let parts = [`${total} execuç${total === 1 ? "ão" : "ões"}`];
      if (ok)      parts.push(`${ok} ok`);
      if (errors)  parts.push(`${errors} com erro`);
      if (running) parts.push(`${running} em andamento`);
      document.getElementById("subtitle").textContent = parts.join(" · ");
    }

    /* ── Detalhe ────────────────────────────── */
    async function openDetail(id) {
      selectedId = id;
      renderTable();
      const panel = document.getElementById("detailPanel");
      panel.classList.add("open");
      panel.querySelector("#detailTitle").textContent = "Carregando...";
      panel.querySelector("#detailMeta").textContent = "";
      panel.querySelector("#detailBadge").innerHTML = "";
      panel.querySelector("#detailSteps").innerHTML = "";
      panel.querySelector("#detailOutputsWrap").style.display = "none";
      panel.querySelector("#detailMetricsWrap").style.display = "none";
      panel.querySelector("#detailErrorWrap").style.display = "none";
      panel.querySelector("#detailActions").innerHTML = "";
      panel.querySelector("#detailJson").textContent = "";

      try {
        const r = await fetch(`/api/runs/${encodeURIComponent(id)}`, { cache: "no-store" });
        const rec = await r.json();
        renderDetail(rec);
      } catch (e) {
        panel.querySelector("#detailTitle").textContent = "Erro ao carregar";
        panel.querySelector("#detailError").textContent = e.message;
        panel.querySelector("#detailErrorWrap").style.display = "";
      }
    }

    function renderDetail(rec) {
      document.getElementById("detailTitle").textContent =
        rec.workflowName ?? rec.workflowId ?? rec.id;

      const inputName = fileName(rec.input?.relativePath ?? rec.input?.path ?? "");
      document.getElementById("detailMeta").textContent =
        [inputName, fmtDate(rec.startedAt), fmtElapsed(rec.elapsedMs)].filter(Boolean).join(" · ");

      document.getElementById("detailBadge").innerHTML = statusBadge(rec.status);

      // Etapas
      const steps = rec.steps ?? [];
      document.getElementById("detailSteps").innerHTML = steps.length
        ? steps.map(s => `<div class="step-row done">
            <div class="step-icon">${esc(STEP_ICONS[s] ?? "·")}</div>
            <div class="step-label">${esc(STEP_LABELS[s] ?? s)}</div>
          </div>`).join("")
        : `<div style="color:var(--muted);font-size:13px">Nenhuma etapa registrada.</div>`;

      // Outputs
      const outputs = rec.outputs ?? {};
      const outEntries = Object.entries(OUTPUT_LABELS)
        .map(([key, label]) => ({ key, label, data: outputs[key] }))
        .filter(e => e.data?.relativePath ?? e.data?.path);

      if (outEntries.length) {
        document.getElementById("detailOutputsWrap").style.display = "";
        document.getElementById("detailOutputs").innerHTML = outEntries.map(({ label, data }) => {
          const relPath = data.relativePath ?? data.path;
          const ext = relPath.split(".").pop();
          const extCls = EXT_CLASS[ext] ?? "";
          return `<div class="output-row">
            <span class="file-ext ${extCls}" style="background:var(--chip);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:800">${esc(ext)}</span>
            <span class="output-path">${esc(relPath)}</span>
            <span class="output-label">${esc(label)}</span>
          </div>`;
        }).join("");
      }

      // Métricas
      const meta = rec.meta ?? {};
      const metricItems = [];
      if (meta.tokenCount != null)
        metricItems.push({ label: "Tokens", value: meta.tokenCount.toLocaleString("pt-BR") });
      if (meta.promptTokens != null)
        metricItems.push({ label: "Tokens prompt", value: meta.promptTokens.toLocaleString("pt-BR") });
      if (meta.completionTokens != null)
        metricItems.push({ label: "Tokens resposta", value: meta.completionTokens.toLocaleString("pt-BR") });
      if (rec.elapsedMs != null)
        metricItems.push({ label: "Duração total", value: fmtElapsed(rec.elapsedMs) });

      if (metricItems.length) {
        document.getElementById("detailMetricsWrap").style.display = "";
        document.getElementById("detailMetrics").innerHTML = metricItems.map(m =>
          `<div class="metric-item"><strong>${esc(m.value)}</strong>${esc(m.label)}</div>`
        ).join("");
      }

      // Erro
      if (rec.error) {
        document.getElementById("detailErrorWrap").style.display = "";
        document.getElementById("detailError").textContent = rec.error.message ?? JSON.stringify(rec.error);
      }

      // JSON bruto
      document.getElementById("detailJson").textContent = JSON.stringify(rec, null, 2);

      // Ações
      const actions = [];
      if (rec.outputs?.artifact?.relativePath) {
        actions.push(`<a href="/index.html" class="btn primary" style="font-size:12px">Ver artefato →</a>`);
      }
      const inputFile = rec.input?.relativePath ?? rec.input?.path;
      if (inputFile && (rec.status === "ok" || rec.status === "error")) {
        actions.push(`<a href="/run.html" class="btn" style="font-size:12px">Re-executar arquivo</a>`);
      }
      document.getElementById("detailActions").innerHTML = actions.join("");
    }

    /* ── Eventos ────────────────────────────── */
    document.getElementById("reloadBtn").addEventListener("click", loadRuns);
    document.getElementById("filterStatus").addEventListener("change", renderTable);
    document.getElementById("filterWorkflow").addEventListener("change", renderTable);
    document.getElementById("filterSearch").addEventListener("input", renderTable);

    loadRuns();
  </script>
  <script src="/nav.js"></script>
</body>
</html>
