<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDA â€” HistÃ³rico</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main { display: flex; flex-direction: column; gap: 14px; }

    /* â”€â”€ Tabela â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .runs-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--line);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--primary-weak); }
    tbody tr.selected { background: var(--primary-weak); }
    tbody td { padding: 10px 12px; vertical-align: middle; }

    .run-id-cell {
      font-family: monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-badge.ok       { background: #dcfce7; color: #15803d; }
    .status-badge.error    { background: #fee2e2; color: #b91c1c; }
    .status-badge.dry-run  { background: #ede9fe; color: #6d28d9; }
    .status-badge.running  { background: #fff7ed; color: #c2410c; }

    .dot-ok      { background: var(--ok); }
    .dot-error   { background: var(--risk); }
    .dot-dry-run { background: #a78bfa; }
    .dot-running { background: var(--warn); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .elapsed-cell { font-family: monospace; font-size: 12px; }
    .input-cell   { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .date-cell    { white-space: nowrap; color: var(--muted); font-size: 12px; }

    /* â”€â”€ Painel de detalhe â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .detail-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .detail-panel.open { display: flex; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail-title { font-size: 16px; font-weight: 800; }

    .step-list { display: flex; flex-direction: column; gap: 6px; }

    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 13px;
    }
    .step-row.done  { border-color: var(--ok);   background: #f4fdf8; }
    .step-row.skip  { opacity: 0.45; }

    .step-icon  { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .step-label { font-weight: 700; flex: 1; }

    .output-list { display: flex; flex-direction: column; gap: 8px; }

    .output-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 13px;
    }

    .output-path {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .output-label { color: var(--muted); font-size: 12px; }

    .metric-row  { display: flex; gap: 14px; flex-wrap: wrap; }
    .metric-item {
      background: var(--chip);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }
    .metric-item strong { font-weight: 800; display: block; font-size: 18px; }

    pre.json-raw {
      background: #1a1f2e;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      font-size: 11px;
      overflow: auto;
      max-height: 320px;
      margin: 0;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: var(--muted);
      padding: 6px 0;
      user-select: none;
    }
    details summary:hover { color: var(--fg); }

    /* â”€â”€ Filtros â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input { font-size: 13px; }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* â”€â”€ Layout dividido â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .split-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 960px) {
      .split-layout {
        grid-template-columns: 1fr 380px;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <h1>APDA â€” HistÃ³rico de execuÃ§Ãµes</h1>
        <div class="subtitle" id="subtitle">Carregando...</div>
      </div>
      <div class="topbar-right">
        <button id="reloadBtn">Recarregar</button>
        <a href="/run.html" class="btn primary">Nova execuÃ§Ã£o â†’</a>
      </div>
    </div>
  </header>

  <main>
    <!-- Filtros -->
    <div class="panel">
      <div class="filter-bar">
        <label style="font-size:12px;font-weight:700;color:var(--muted)">STATUS</label>
        <select id="filterStatus">
          <option value="">Todos</option>
          <option value="ok">ok</option>
          <option value="error">error</option>
          <option value="dry-run">dry-run</option>
          <option value="running">running</option>
        </select>
        <label style="font-size:12px;font-weight:700;color:var(--muted);margin-left:4px">WORKFLOW</label>
        <select id="filterWorkflow">
          <option value="">Todos</option>
        </select>
        <input id="filterSearch" type="search" placeholder="Filtrar por arquivo..." style="min-width:200px;margin-left:auto">
      </div>
    </div>

    <div class="split-layout">
      <!-- Tabela de execuÃ§Ãµes -->
      <div class="panel">
        <div class="runs-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Workflow</th>
                <th>Arquivo</th>
                <th>DuraÃ§Ã£o</th>
                <th>Data</th>
                <th>ID</th>
              </tr>
            </thead>
            <tbody id="runsBody">
              <tr><td colspan="6" class="empty-state">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Detalhe lateral -->
      <div id="detailPanel" class="panel detail-panel">
        <div class="detail-header">
          <div>
            <div class="detail-title" id="detailTitle">â€“</div>
            <div style="color:var(--muted);font-size:12px;margin-top:3px" id="detailMeta">â€“</div>
          </div>
          <div id="detailBadge"></div>
        </div>

        <!-- Etapas -->
        <div>
          <div class="field-label" style="margin-bottom:8px">Etapas</div>
          <div id="detailSteps" class="step-list"></div>
        </div>

        <!-- Arquivos gerados -->
        <div id="detailOutputsWrap" style="display:none">
          <div class="field-label" style="margin-bottom:8px">Arquivos gerados</div>
          <div id="detailOutputs" class="output-list"></div>
        </div>

        <!-- MÃ©tricas -->
        <div id="detailMetricsWrap" style="display:none">
          <div class="field-label" style="margin-bottom:8px">MÃ©tricas</div>
          <div id="detailMetrics" class="metric-row"></div>
        </div>

        <!-- Erro -->
        <div id="detailErrorWrap" style="display:none">
          <div class="field-label" style="margin-bottom:6px;color:var(--risk)">Erro</div>
          <div id="detailError" class="error-msg"></div>
        </div>

        <!-- JSON bruto -->
        <details>
          <summary>JSON bruto (auditoria)</summary>
          <pre id="detailJson" class="json-raw"></pre>
        </details>

        <!-- AÃ§Ãµes -->
        <div id="detailActions" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
    </div>
  </main>

  <script type="module" src="/pages/history.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
