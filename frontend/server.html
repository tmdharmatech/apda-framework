<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDA — Servidor</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main { display: flex; flex-direction: column; gap: 14px; }

    .server-status-block {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: 10px;
      border: 2px solid var(--line);
      background: var(--panel);
    }

    .server-status-block.active   { border-color: #6fcf97; background: #f2fbf6; }
    .server-status-block.external { border-color: #f2c94c; background: #fffdf0; }
    .server-status-block.inactive { border-color: var(--line); }
    .server-status-block.busy     { border-color: var(--warn); background: #fffdf0; }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.active   { background: var(--ok); box-shadow: 0 0 0 3px #b8f0d0; }
    .status-dot.external { background: var(--warn); box-shadow: 0 0 0 3px #fce9a0; }
    .status-dot.inactive { background: var(--muted); }

    .status-text { flex: 1; }
    .status-title { font-weight: 800; font-size: 15px; }
    .status-sub   { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .cmd-box {
      background: #101923;
      color: #eaf2f8;
      border-radius: 6px;
      padding: 12px 14px;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre;
      margin-top: 4px;
    }

    .log-panel {
      background: #0d1620;
      color: #c8dde8;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      overflow-y: auto;
      max-height: 320px;
      min-height: 100px;
    }

    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-line.highlight { color: #7ee8a2; }

    .progress-bar {
      height: 4px;
      background: var(--primary-weak);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-fill.indeterminate {
      width: 40%;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .notice {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <h1>APDA — Gerenciamento do Servidor</h1>
        <div class="subtitle">Controle do <code>llama-server</code> local — equivalente ao <code>apda server</code>.</div>
      </div>
      <div class="actions">
        <button id="reloadBtn" type="button">Atualizar status</button>
      </div>
    </div>
  </header>

  <main>
    <div id="statusBlock" class="server-status-block inactive">
      <div class="status-dot inactive"></div>
      <div class="status-text">
        <div class="status-title">Carregando...</div>
      </div>
    </div>

    <div id="errorMsg" style="display:none" class="panel">
      <p class="error-msg" id="errorText"></p>
    </div>

    <div id="progressRow" style="display:none" class="panel">
      <div id="progressLabel" style="font-size:13px;font-weight:700;margin-bottom:6px">Iniciando servidor...</div>
      <div class="progress-bar"><div class="progress-fill indeterminate" id="progressFill"></div></div>
      <div id="progressTimer" style="color:var(--muted);font-size:12px;margin-top:6px">0s</div>
    </div>

    <div id="detailPanel" class="detail-grid" style="display:none">
      <div class="panel" id="infoPanel"></div>
      <div class="panel" id="cmdPanel"></div>
    </div>

    <div class="panel" id="logSection" style="display:none">
      <div class="panel-head">
        <h2>Log do servidor</h2>
        <div class="actions">
          <button id="toggleLogBtn" type="button">Ocultar log</button>
          <button id="refreshLogBtn" type="button">Atualizar log</button>
        </div>
      </div>
      <div class="log-panel" id="logContent">
        <div style="color:var(--muted)">Nenhuma linha de log disponível.</div>
      </div>
    </div>
  </main>

  <script type="module" src="/pages/server.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
