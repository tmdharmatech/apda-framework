<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDA — Artefatos</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .content { display: flex; flex-direction: column; gap: 14px; }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Validação ───────────────────────────── */
    .validation-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      flex-wrap: wrap;
    }
    .validation-bar.valid   { border-color: var(--ok);   background: #f4fdf8; }
    .validation-bar.invalid { border-color: var(--risk); background: #fef5f5; }

    .validation-label { font-weight: 700; font-size: 13px; flex: 1; }

    .validation-errors {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 14px 10px 14px;
      border-left: 3px solid var(--risk);
      margin-top: 4px;
    }
    .validation-error-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 12px;
    }
    .error-field {
      font-family: monospace;
      font-weight: 700;
      color: var(--risk);
      flex-shrink: 0;
    }
    .error-msg-text { color: var(--fg); }

    /* ── Upload zone ─────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--line);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover,
    .upload-zone.dragover { border-color: var(--primary); background: var(--primary-weak); color: var(--primary); }

    .upload-zone label { cursor: pointer; }

    /* ── Sidebar item badge ──────────────────── */
    .item-valid   { float: right; color: var(--ok);   font-size: 12px; margin-left: 4px; }
    .item-invalid { float: right; color: var(--risk); font-size: 12px; margin-left: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <h1>APDA — Visualizador de Artefatos</h1>
        <div class="subtitle">Leitura visual dos artefatos pedagógicos gerados pelo pipeline.</div>
      </div>
      <div class="topbar-right">
        <button id="reloadBtn">Recarregar</button>
        <label class="btn" style="cursor:pointer" title="Carregar JSON local para visualização e validação">
          Carregar JSON
          <input id="fileInput" type="file" accept=".json,application/json" multiple style="display:none">
        </label>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-head">
        <input id="searchInput" class="search" type="search" placeholder="Filtrar artefatos">
      </div>
      <div id="artifactList" class="item-list">
        <div class="empty">Carregando artefatos...</div>
      </div>
    </aside>

    <div class="content">
      <div class="metrics" id="metrics"></div>
      <section class="panel" id="detailPanel">
        <div class="empty">Selecione um artefato para visualizar.</div>
      </section>
    </div>
  </main>

  <script>
    const state = { artifacts: [], selectedIndex: 0, query: "", validations: {} };

    const els = {
      list:   document.getElementById("artifactList"),
      panel:  document.getElementById("detailPanel"),
      metrics: document.getElementById("metrics"),
      search: document.getElementById("searchInput"),
    };

    function text(v, fb = "Não informado") {
      return (v === null || v === undefined || v === "") ? fb : String(v);
    }

    function esc(v) {
      return text(v, "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
    }

    function statusClass(v) {
      const n = text(v, "").toLowerCase();
      if (["validado","processado","alta","baixo"].includes(n)) return "ok";
      if (["pendente","pendente_revisao","medio","media","nao_calculada","nao_avaliado"].includes(n)) return "warn";
      if (["alto","erro","rejeitado","baixa"].includes(n)) return "risk";
      return "";
    }

    function arrayItems(items) {
      if (!Array.isArray(items) || !items.length) return `<div class="field-value">Não informado</div>`;
      return `<ul>${items.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`;
    }

    function chips(items) {
      if (!Array.isArray(items) || !items.length) return `<div class="field-value">Nenhum item registrado</div>`;
      return `<div class="chips">${items.map(i => `<span class="chip">${esc(i)}</span>`).join("")}</div>`;
    }

    function artifactTitle(item) {
      return item.label || item.data?.origem?.nome_arquivo || item.path || "Artefato sem título";
    }

    function filtered() {
      const q = state.query.trim().toLowerCase();
      if (!q) return state.artifacts;
      return state.artifacts.filter(item => {
        const blob = JSON.stringify(item.data || {}).toLowerCase() + " " + artifactTitle(item).toLowerCase();
        return blob.includes(q);
      });
    }

    function validationBadge(item) {
      const v = state.validations[item.path];
      if (!v) return "";
      if (v.loading) return `<span class="item-valid" title="Validando...">…</span>`;
      return v.result?.ok
        ? `<span class="item-valid" title="Schema válido">✓</span>`
        : `<span class="item-invalid" title="${v.result?.errors?.length ?? 0} erro(s) de schema">✗</span>`;
    }

    function renderList() {
      const items = filtered();
      if (!items.length) {
        const hasAny = state.artifacts.length > 0;
        els.list.innerHTML = hasAny
          ? `<div class="empty">Nenhum artefato corresponde ao filtro.</div>`
          : `<div class="empty">Nenhum artefato em <code>saida/</code>.<br><br>
               <a href="/run.html" style="color:var(--primary);font-weight:700">Executar workflow →</a></div>`;
        return;
      }
      els.list.innerHTML = items.map(item => {
        const ri = state.artifacts.indexOf(item);
        const d = item.data || {};
        const active = ri === state.selectedIndex ? " active" : "";
        return `<button class="item-btn${active}" type="button" data-index="${ri}">
          <div class="item-title">${validationBadge(item)}${esc(artifactTitle(item))}</div>
          <div class="item-meta">
            ${esc(d.tipo_artefato || "tipo indefinido")} ·
            ${esc((d.metadados_processamento || {}).status || "sem status")} ·
            ${esc((d.validacao_humana || {}).status || "sem validação")}
          </div>
        </button>`;
      }).join("");
      els.list.querySelectorAll("[data-index]").forEach(btn => {
        btn.addEventListener("click", () => { state.selectedIndex = Number(btn.dataset.index); render(); });
      });
    }

    function renderMetrics(d) {
      if (!d) { els.metrics.innerHTML = ""; return; }
      const cp = d.conteudo_pedagogico || {};
      const anon = d.anonimizacao || {};
      const val = d.validacao_humana || {};
      const meta = d.metadados_processamento || {};
      const total = (cp.barreiras_identificadas || []).length +
                    (cp.estrategias_pedagogicas || []).length +
                    (cp.recursos_acessibilidade || []).length;

      els.metrics.innerHTML = [
        `<div class="metric"><div class="metric-label">Tipo</div><div class="metric-value">${esc(d.tipo_artefato || "—")}</div></div>`,
        `<div class="metric"><div class="metric-label">Sinais extraídos</div><div class="metric-value">${total}</div></div>`,
        `<div class="metric"><div class="metric-label">Risco PII</div><div class="metric-value"><span class="status ${statusClass(anon.risco_reidentificacao)}">${esc(anon.risco_reidentificacao || "nao_avaliado")}</span></div></div>`,
        `<div class="metric"><div class="metric-label">Validação</div><div class="metric-value"><span class="status ${statusClass(val.status || meta.status)}">${esc(val.status || meta.status || "pendente")}</span></div></div>`,
      ].join("");
    }

    function renderDetail() {
      const item = state.artifacts[state.selectedIndex];
      if (!item) {
        els.panel.innerHTML = `<div class="empty">Selecione um artefato para visualizar.</div>`;
        renderMetrics(null);
        return;
      }
      const d = item.data || {};
      const orig = d.origem || {};
      const cp = d.conteudo_pedagogico || {};
      const anon = d.anonimizacao || {};
      const meta = d.metadados_processamento || {};
      const val = d.validacao_humana || {};

      renderMetrics(d);

      els.panel.innerHTML = `
        <h2>${esc(artifactTitle(item))}</h2>
        <div class="grid-two">
          <div>
            <div class="field"><div class="field-label">Arquivo de origem</div><div class="field-value">${esc(orig.nome_arquivo)}</div></div>
            <div class="field"><div class="field-label">Formato original</div><div class="field-value">${esc(orig.formato_original)}</div></div>
            <div class="field"><div class="field-label">Página ou aba</div><div class="field-value">${esc(orig.pagina_ou_aba)}</div></div>
          </div>
          <div>
            <div class="field"><div class="field-label">Pipeline</div><div class="field-value">${esc(meta.pipeline_versao)} · ${esc(meta.status)}</div></div>
            <div class="field"><div class="field-label">Confiança da extração</div><div class="field-value"><span class="status ${statusClass(meta.confianca_extracao)}">${esc(meta.confianca_extracao)}</span></div></div>
            <div class="field"><div class="field-label">Validação humana</div><div class="field-value"><span class="status ${statusClass(val.status)}">${esc(val.status)}</span></div></div>
          </div>
        </div>
        <div class="field"><div class="field-label">Objetivo pedagógico</div><div class="field-value">${esc(cp.objetivo_pedagogico)}</div></div>
        <div class="grid-two">
          <div class="field"><div class="field-label">Barreiras identificadas</div>${arrayItems(cp.barreiras_identificadas)}</div>
          <div class="field"><div class="field-label">Estratégias pedagógicas</div>${arrayItems(cp.estrategias_pedagogicas)}</div>
        </div>
        <div class="grid-two">
          <div class="field"><div class="field-label">Recursos de acessibilidade</div>${arrayItems(cp.recursos_acessibilidade)}</div>
          <div class="field"><div class="field-label">Itens mascarados</div>${chips(anon.itens_mascarados)}</div>
        </div>
        <div class="field"><div class="field-label">Observações relevantes</div><div class="field-value">${esc(cp.observacoes_relevantes)}</div></div>
        <details>
          <summary>JSON bruto para auditoria</summary>
          <pre>${esc(JSON.stringify(d, null, 2))}</pre>
        </details>
        <div id="validationSection">${renderValidationSection(item)}</div>`;
    }

    function renderValidationSection(item) {
      if (!item) return "";
      const v = state.validations[item.path];

      const btnLabel = v?.loading ? "Validando…" : "Validar schema";
      const btnDisabled = v?.loading ? " disabled" : "";

      let resultHtml = "";
      if (v?.result) {
        if (v.result.ok) {
          resultHtml = `<div class="validation-bar valid">
            <span style="font-size:18px">✓</span>
            <span class="validation-label">Schema válido — artefato conforme com <code>artefato_pedagogico.schema.json</code>.</span>
          </div>`;
        } else {
          const rows = (v.result.details ?? []).map(e =>
            `<div class="validation-error-row">
              <span class="error-field">${esc(e.path)}</span>
              <span class="error-msg-text">${esc(e.message)}</span>
            </div>`
          ).join("");
          resultHtml = `<div class="validation-bar invalid">
            <span style="font-size:18px">✗</span>
            <span class="validation-label">${v.result.errors?.length ?? 0} erro(s) de schema encontrado(s).</span>
          </div>
          <div class="validation-errors">${rows}</div>`;
        }
      }

      return `<div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="field-label">Validação de schema</div>
          <button type="button" id="validateBtn"${btnDisabled}
            style="font-size:12px;padding:4px 10px"
            onclick="triggerValidation()">${btnLabel}</button>
        </div>
        ${resultHtml}
      </div>`;
    }

    function render() { renderList(); renderDetail(); }

    /* ── Validação ────────────────────────────── */
    async function triggerValidation() {
      const item = state.artifacts[state.selectedIndex];
      if (!item) return;
      state.validations[item.path] = { loading: true };
      refreshValidationSection(item);
      try {
        const body = item.virtual
          ? { artifact: item.data }
          : { file: item.path };
        const r = await fetch("/api/validate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const result = await r.json();
        state.validations[item.path] = { loading: false, result };
      } catch (e) {
        state.validations[item.path] = {
          loading: false,
          result: { ok: false, errors: [e.message], details: [{ path: "<rede>", keyword: "fetch", message: e.message }] },
        };
      }
      refreshValidationSection(item);
      renderList();
    }

    function refreshValidationSection(item) {
      const sec = document.getElementById("validationSection");
      if (sec) sec.innerHTML = renderValidationSection(item);
    }

    async function loadArtifacts() {
      els.list.innerHTML = `<div class="empty">Carregando artefatos...</div>`;
      els.panel.innerHTML = `<div class="empty">Carregando detalhes...</div>`;
      try {
        const r = await fetch("/api/artifacts", { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        state.artifacts = await r.json();
        state.selectedIndex = 0;
        render();
      } catch (err) {
        els.metrics.innerHTML = "";
        els.list.innerHTML = `<div class="empty">Não foi possível carregar artefatos.</div>`;
        els.panel.innerHTML = `<p class="error-msg">Erro: ${esc(err.message)}</p>
          <p>Verifique se o servidor APDA está rodando: <code>apda web</code></p>`;
      }
    }

    async function loadFiles(files) {
      const additions = [];
      for (const f of files) {
        const raw = await f.text();
        additions.push({ label: f.name, path: f.name, virtual: true, data: JSON.parse(raw) });
      }
      state.artifacts = additions.concat(state.artifacts);
      state.selectedIndex = 0;
      render();
    }

    els.search.addEventListener("input", e => { state.query = e.target.value; renderList(); });

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("reloadBtn")?.addEventListener("click", loadArtifacts);

      const fileInput = document.getElementById("fileInput");
      fileInput?.addEventListener("change", async e => {
        try { await loadFiles(Array.from(e.target.files || [])); }
        catch (err) { els.panel.innerHTML = `<p class="error-msg">JSON inválido: ${esc(err.message)}</p>`; }
        finally { e.target.value = ""; }
      });

      // Drag-and-drop global
      document.body.addEventListener("dragover", e => { e.preventDefault(); });
      document.body.addEventListener("drop", async e => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer?.files ?? []).filter(f => f.name.endsWith(".json"));
        if (!files.length) return;
        try { await loadFiles(files); }
        catch (err) { alert(`Erro ao carregar JSON: ${err.message}`); }
      });
    });

    loadArtifacts();
  </script>
  <script src="/nav.js"></script>
</body>
</html>
