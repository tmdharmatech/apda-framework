<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDA — Artefatos</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .content { display: flex; flex-direction: column; gap: 14px; }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Validação ───────────────────────────── */
    .validation-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      flex-wrap: wrap;
    }
    .validation-bar.valid   { border-color: var(--ok);   background: #f4fdf8; }
    .validation-bar.invalid { border-color: var(--risk); background: #fef5f5; }

    .validation-label { font-weight: 700; font-size: 13px; flex: 1; }

    .validation-errors {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 14px 10px 14px;
      border-left: 3px solid var(--risk);
      margin-top: 4px;
    }
    .validation-error-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 12px;
    }
    .error-field {
      font-family: monospace;
      font-weight: 700;
      color: var(--risk);
      flex-shrink: 0;
    }
    .error-msg-text { color: var(--fg); }

    /* ── Upload zone ─────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--line);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover,
    .upload-zone.dragover { border-color: var(--primary); background: var(--primary-weak); color: var(--primary); }

    .upload-zone label { cursor: pointer; }

    /* ── Sidebar item badge ──────────────────── */
    .item-valid   { float: right; color: var(--ok);   font-size: 12px; margin-left: 4px; }
    .item-invalid { float: right; color: var(--risk); font-size: 12px; margin-left: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <h1>APDA — Visualizador de Artefatos</h1>
        <div class="subtitle">Leitura visual dos artefatos pedagógicos gerados pelo pipeline.</div>
      </div>
      <div class="topbar-right">
        <button id="reloadBtn">Recarregar</button>
        <label class="btn" style="cursor:pointer" title="Carregar JSON local para visualização e validação">
          Carregar JSON
          <input id="fileInput" type="file" accept=".json,application/json" multiple style="display:none">
        </label>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-head">
        <input id="searchInput" class="search" type="search" placeholder="Filtrar artefatos">
      </div>
      <div id="artifactList" class="item-list">
        <div class="empty">Carregando artefatos...</div>
      </div>
    </aside>

    <div class="content">
      <div class="metrics" id="metrics"></div>
      <section class="panel" id="detailPanel">
        <div class="empty">Selecione um artefato para visualizar.</div>
      </section>
    </div>
  </main>

  <script type="module" src="/pages/index.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
